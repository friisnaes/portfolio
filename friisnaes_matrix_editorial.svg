<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 680 600" width="100%" role="img">
<title>Friisnæs portefølje — kompleksitet vs relevans</title>
<desc>Editorial matrix der placerer Friisnæs' digitale produktioner ud fra kompleksitet og relevans. Klikbar — hver prik åbner den live produktion.</desc>

<defs>
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap');

    .serif       { font-family: 'Cormorant Garamond', Georgia, serif; }
    .serif-i     { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; }
    .sans        { font-family: 'DM Sans', system-ui, sans-serif; }

    .figure-num  { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 13px; fill: #C9A84C; letter-spacing: 0.04em; }
    .title       { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; font-size: 22px; fill: #0C1829; letter-spacing: -0.005em; }
    .lede        { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 13px; fill: #6B6B6B; letter-spacing: 0.01em; }

    .axis-label  { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: #6B6B6B; letter-spacing: 0.06em; }
    .quad        { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 9.5px; fill: #B5AFA0; letter-spacing: 0.08em; }

    .label       { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 400; font-size: 10.5px; fill: #1A1A1A; }
    .label-em    { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500; font-size: 10.5px; fill: #0C1829; }

    .legend-key  { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: #4A4A4A; letter-spacing: 0.02em; }
    .footnote    { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 10.5px; fill: #9A9A9A; letter-spacing: 0.03em; }

    a            { cursor: pointer; }
    a:hover circle { stroke-width: 1.5; }
    a:hover .label, a:hover .label-em { fill: #C9A84C; }
  ]]></style>
</defs>

<!-- Cream background -->
<rect x="0" y="0" width="680" height="600" fill="#F5F1E8"/>

<!-- Top accent line (gold gradient, matches launcher) -->
<line x1="60" y1="36" x2="240" y2="36" stroke="#C9A84C" stroke-width="0.75" stroke-linecap="round"/>

<!-- Header -->
<text class="figure-num" x="60" y="60">Figur i.</text>
<text class="title" x="60" y="86">Portefølje — <tspan font-style="italic" fill="#C9A84C">kompleksitet vs relevans.</tspan></text>
<text class="lede" x="60" y="108">Et øjebliksbillede af tretten digitale produktioner. Klik for at åbne.</text>

<!-- Axes (subtle, no arrowheads — let labels do the talking) -->
<line x1="80" y1="150" x2="80" y2="450" stroke="#0C1829" stroke-width="0.4" opacity="0.55"/>
<line x1="80" y1="450" x2="640" y2="450" stroke="#0C1829" stroke-width="0.4" opacity="0.55"/>

<!-- Quadrant guides (whisper-thin) -->
<line x1="360" y1="150" x2="360" y2="450" stroke="#0C1829" stroke-width="0.3" stroke-dasharray="1.5 4" opacity="0.18"/>
<line x1="80" y1="300" x2="640" y2="300" stroke="#0C1829" stroke-width="0.3" stroke-dasharray="1.5 4" opacity="0.18"/>

<!-- Axis labels (small italic serif) -->
<text class="axis-label" x="80" y="140">↑ Relevans</text>
<text class="axis-label" x="640" y="468" text-anchor="end">Kompleksitet →</text>

